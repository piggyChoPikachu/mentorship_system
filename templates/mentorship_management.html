<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentorship Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      padding: 20px 0;
    }

    .mentorship-container {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header-card,
    .section-card {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 24px;
    }

    .header-card {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-nav {
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      background: #fff;
      color: #4d5ed1;
      border: 1px solid #d8ddff;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-count {
      font-size: 14px;
      color: #666;
    }

    .message {
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .mentorship-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .mentorship-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      background: #fafafa;
    }

    .person-cell {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #667eea;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .mini-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 8px;
      margin-top: 4px;
    }

    .identity-badge {
      background: #eef4ff;
      color: #4860d3;
    }

    .topic-badge {
      background: #e7f7ee;
      color: #21875d;
    }

    .type-badge {
      background: #f3ecff;
      color: #6f42c1;
    }

    .status-badge {
      background: #d4edda;
      color: #155724;
    }

    .mentorship-lines {
      color: #444;
      font-size: 14px;
    }

    .mentorship-lines div {
      margin-bottom: 4px;
    }

    .empty-state,
    .loading {
      padding: 20px;
      text-align: center;
      color: #666;
      border: 1px dashed #ddd;
      border-radius: 8px;
      background: #fcfcfc;
    }

    @media (max-width: 900px) {
      .mentorship-item {
        grid-template-columns: 1fr;
      }

      .header-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="mentorship-container">

  <div class="header-card">
    <div>
      <h1>🤝 Mentorship Management</h1>
      <div style="color:#666; margin-top:6px;">
        View your active mentorship relationships.
      </div>
      <div id="current-user-info" style="margin-top:10px; font-weight:600; color:#444;">
        Logged in as: Loading...
      </div>
    </div>

    <div class="header-actions">
      <a href="/matching" class="btn-nav">Matching</a>
      <a href="/requests-management" class="btn-nav">Requests</a>
      <a href="/published-profile" class="btn-nav">Published Profile</a>
      <a href="/preference" class="btn-nav">Preferences</a>
      <a href="/logout" class="btn-nav">Logout</a>
    </div>
  </div>

  <div id="message" class="message"></div>

  <div class="section-card">
    <div class="section-title-row">
      <h2 style="margin:0; font-size:22px;">Active Mentorships</h2>
      <div class="section-count" id="active-count"></div>
    </div>

    <div id="loading" class="loading" style="display:none;">⏳ Loading mentorships...</div>
    <div id="mentorship-container" class="mentorship-list"></div>
  </div>

</div>

<script>
  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = `message show ${type}`;
    setTimeout(() => { msg.className = 'message'; }, 4000);
  }

  function getInitials(firstName, lastName) {
    const first = (firstName || '').trim();
    const last = (lastName || '').trim();
    return `${first.charAt(0) || '?'}${last.charAt(0) || ''}`.toUpperCase();
  }

  function capitalizeRole(role) {
    return (role || '').replaceAll('_', '-').replace(/\b\w/g, c => c.toUpperCase());
  }

  function renderMentorships(mentorships) {
    const container = document.getElementById('mentorship-container');
    document.getElementById('active-count').textContent =
      `${mentorships.length} item${mentorships.length !== 1 ? 's' : ''}`;

    if (!mentorships || mentorships.length === 0) {
      container.innerHTML = `<div class="empty-state">No active mentorships yet.</div>`;
      return;
    }

    container.innerHTML = mentorships.map(row => {
      const displayName =
        `${row.other_first_name || ''} ${row.other_last_name || ''}`.trim() || 'Unnamed User';

      return `
        <div class="mentorship-item">
          <div class="person-cell">
            <div class="user-avatar">${getInitials(row.other_first_name, row.other_last_name)}</div>
            <div>
              <div class="user-name">${displayName}</div>
              <span class="mini-badge identity-badge">${capitalizeRole(row.other_identity_role)}</span>
              <span class="mini-badge topic-badge">${row.topic_name}</span>
              <span class="mini-badge type-badge">${capitalizeRole(row.mentorship_type)}</span>
              <span class="mini-badge status-badge">${capitalizeRole(row.status)}</span>
            </div>
          </div>

          <div class="mentorship-lines">
            <div><strong>Topic:</strong> ${row.topic_name}</div>
            <div><strong>Mentorship Type:</strong> ${capitalizeRole(row.mentorship_type)}</div>
            <div><strong>Status:</strong> ${capitalizeRole(row.status)}</div>
            <div><strong>Start Date:</strong> ${row.start_date || 'Not specified'}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderPage(data) {
    const user = data.current_user || {};
    const displayName =
      `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.username || 'Current User';

    document.getElementById('current-user-info').textContent =
      `Logged in as: ${displayName} (${capitalizeRole(user.identity_role || '')})`;

    renderMentorships(data.mentorships || []);
  }

  async function loadMentorships() {
    const loading = document.getElementById('loading');
    loading.style.display = 'block';

    try {
      const res = await fetch('/api/mentorship-management/active');
      const data = await res.json();
      loading.style.display = 'none';

      if (!res.ok) {
        showMessage(data.error || 'Error loading mentorships', 'error');
        return;
      }

      renderPage(data);
    } catch (error) {
      loading.style.display = 'none';
      showMessage('Error loading mentorships', 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadMentorships();
  });
</script>
</body>
</html>
