<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requests Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      padding: 20px 0;
    }

    .requests-container {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header-card,
    .section-card {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 24px;
    }

    .header-card {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-nav,
    .btn-action {
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .btn-nav {
      background: #fff;
      color: #4d5ed1;
      border: 1px solid #d8ddff;
    }

    .btn-accept {
      background: #198754;
      color: white;
    }

    .btn-reject {
      background: #dc3545;
      color: white;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-count {
      font-size: 14px;
      color: #666;
    }

    .message {
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .requests-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .request-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      background: #fafafa;
    }

    .person-cell {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #667eea;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .mini-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 8px;
      margin-top: 4px;
    }

    .identity-badge {
      background: #eef4ff;
      color: #4860d3;
    }

    .topic-badge {
      background: #e7f7ee;
      color: #21875d;
    }

    .status-badge {
      background: #f3f4f6;
      color: #444;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-accepted {
      background: #d4edda;
      color: #155724;
    }

    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }

    .request-lines {
      color: #444;
      font-size: 14px;
    }

    .request-lines div {
      margin-bottom: 4px;
    }

    .actions-cell {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty-state,
    .loading {
      padding: 20px;
      text-align: center;
      color: #666;
      border: 1px dashed #ddd;
      border-radius: 8px;
      background: #fcfcfc;
    }

    @media (max-width: 900px) {
      .request-item {
        grid-template-columns: 1fr;
      }

      .actions-cell {
        justify-content: flex-start;
      }

      .header-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="requests-container">

  <div class="header-card">
    <div>
      <h1>📥 Requests Management</h1>
      <div style="color:#666; margin-top:6px;">
        Manage received requests and view your sent request history.
      </div>
      <div id="current-user-info" style="margin-top:10px; font-weight:600; color:#444;">
        Logged in as: Loading...
      </div>
    </div>

    <div class="header-actions">
      <a href="/matching" class="btn-nav">Matching</a>
      <a href="/published-profile" class="btn-nav">Published Profile</a>
      <a href="/preference" class="btn-nav">Preferences</a>
	  <a href="/mentorship-management" class="btn-nav">Mentorships</a>
      <a href="/logout" class="btn-nav">Logout</a>
    </div>
  </div>

  <div id="message" class="message"></div>

  <div class="section-card">
    <h2 style="margin-bottom:18px;">Received Requests</h2>

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Pending</h3>
      <div class="section-count" id="received-pending-count"></div>
    </div>
    <div id="loading" class="loading" style="display:none;">⏳ Loading requests...</div>
    <div id="received-pending-container" class="requests-list"></div>

    <hr style="margin:24px 0;">

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Accepted</h3>
      <div class="section-count" id="received-accepted-count"></div>
    </div>
    <div id="received-accepted-container" class="requests-list"></div>

    <hr style="margin:24px 0;">

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Rejected</h3>
      <div class="section-count" id="received-rejected-count"></div>
    </div>
    <div id="received-rejected-container" class="requests-list"></div>
  </div>

  <div class="section-card">
    <h2 style="margin-bottom:18px;">Sent Requests</h2>

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Pending</h3>
      <div class="section-count" id="sent-pending-count"></div>
    </div>
    <div id="sent-pending-container" class="requests-list"></div>

    <hr style="margin:24px 0;">

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Accepted</h3>
      <div class="section-count" id="sent-accepted-count"></div>
    </div>
    <div id="sent-accepted-container" class="requests-list"></div>

    <hr style="margin:24px 0;">

    <div class="section-title-row">
      <h3 style="margin:0; font-size:20px;">Rejected</h3>
      <div class="section-count" id="sent-rejected-count"></div>
    </div>
    <div id="sent-rejected-container" class="requests-list"></div>
  </div>

</div>

<script>
  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = `message show ${type}`;
    setTimeout(() => { msg.className = 'message'; }, 4000);
  }

  function getInitials(firstName, lastName) {
    const first = (firstName || '').trim();
    const last = (lastName || '').trim();
    return `${first.charAt(0) || '?'}${last.charAt(0) || ''}`.toUpperCase();
  }

  function capitalizeRole(role) {
    return (role || '').replaceAll('_', '-').replace(/\b\w/g, c => c.toUpperCase());
  }

  function getStatusBadgeClass(status) {
    if (status === 'pending') return 'status-pending';
    if (status === 'accepted') return 'status-accepted';
    if (status === 'rejected') return 'status-rejected';
    return '';
  }

  function emptyTextFor(containerId) {
    const mapping = {
      'received-pending-container': 'No received pending requests.',
      'received-accepted-container': 'No received accepted requests.',
      'received-rejected-container': 'No received rejected requests.',
      'sent-pending-container': 'No sent pending requests.',
      'sent-accepted-container': 'No sent accepted requests.',
      'sent-rejected-container': 'No sent rejected requests.'
    };
    return mapping[containerId] || 'No requests.';
  }

  function renderRequestList(requests, containerId, mode) {
    const container = document.getElementById(containerId);

    if (!requests || requests.length === 0) {
      container.innerHTML = `<div class="empty-state">${emptyTextFor(containerId)}</div>`;
      return;
    }

    container.innerHTML = requests.map(row => {
      const senderName =
        `${row.sender_first_name || ''} ${row.sender_last_name || ''}`.trim() || 'Unnamed User';
      const receiverName =
        `${row.receiver_first_name || ''} ${row.receiver_last_name || ''}`.trim() || 'Unnamed User';

      const displayName = mode === 'received' ? senderName : receiverName;
      const displayRole = mode === 'received' ? row.sender_identity_role : row.receiver_identity_role;
      const relationLabel = mode === 'received' ? 'Sender' : 'Receiver';

      const actionButtons = mode === 'received' && row.status === 'pending'
        ? `
          <button class="btn-action btn-accept" onclick="updateRequestStatus(${row.request_id}, 'accepted')">Accept</button>
          <button class="btn-action btn-reject" onclick="updateRequestStatus(${row.request_id}, 'rejected')">Reject</button>
        `
        : '';

      return `
        <div class="request-item">
          <div class="person-cell">
            <div class="user-avatar">
              ${mode === 'received'
                ? getInitials(row.sender_first_name, row.sender_last_name)
                : getInitials(row.receiver_first_name, row.receiver_last_name)}
            </div>
            <div>
              <div class="user-name">${displayName}</div>
              <span class="mini-badge identity-badge">${capitalizeRole(displayRole)}</span>
              <span class="mini-badge topic-badge">${row.topic_name}</span>
              <span class="mini-badge status-badge ${getStatusBadgeClass(row.status)}">${capitalizeRole(row.status)}</span>
            </div>
          </div>

          <div class="request-lines">
            <div><strong>${relationLabel}:</strong> ${displayName}</div>
            <div><strong>Topic:</strong> ${row.topic_name}</div>
            <div><strong>Status:</strong> ${capitalizeRole(row.status)}</div>
          </div>

          <div class="actions-cell">
            ${actionButtons}
          </div>
        </div>
      `;
    }).join('');
  }

  function updateCount(id, items) {
    document.getElementById(id).textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
  }

  function renderAllSections(data) {
    const user = data.current_user || {};
    const displayName =
      `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.username || 'Current User';

    document.getElementById('current-user-info').textContent =
      `Logged in as: ${displayName} (${capitalizeRole(user.identity_role || '')})`;

    const receivedPending = data.received_pending || [];
    const receivedAccepted = data.received_accepted || [];
    const receivedRejected = data.received_rejected || [];
    const sentPending = data.sent_pending || [];
    const sentAccepted = data.sent_accepted || [];
    const sentRejected = data.sent_rejected || [];

    updateCount('received-pending-count', receivedPending);
    updateCount('received-accepted-count', receivedAccepted);
    updateCount('received-rejected-count', receivedRejected);
    updateCount('sent-pending-count', sentPending);
    updateCount('sent-accepted-count', sentAccepted);
    updateCount('sent-rejected-count', sentRejected);

    renderRequestList(receivedPending, 'received-pending-container', 'received');
    renderRequestList(receivedAccepted, 'received-accepted-container', 'received');
    renderRequestList(receivedRejected, 'received-rejected-container', 'received');

    renderRequestList(sentPending, 'sent-pending-container', 'sent');
    renderRequestList(sentAccepted, 'sent-accepted-container', 'sent');
    renderRequestList(sentRejected, 'sent-rejected-container', 'sent');
  }

  async function loadRequestsOverview() {
    const loading = document.getElementById('loading');
    loading.style.display = 'block';

    try {
      const res = await fetch('/api/requests-management/overview');
      const data = await res.json();
      loading.style.display = 'none';

      if (!res.ok) {
        showMessage(data.error || 'Error loading requests', 'error');
        return;
      }

      renderAllSections(data);
    } catch (error) {
      loading.style.display = 'none';
      showMessage('Error loading requests', 'error');
    }
  }

  async function updateRequestStatus(requestId, newStatus) {
    try {
      const res = await fetch(`/api/requests-management/request/${requestId}/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.error || 'Error updating request', 'error');
        return;
      }

      showMessage(data.message || 'Request updated successfully', 'success');
      await loadRequestsOverview();
    } catch (error) {
      showMessage('Error updating request', 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await loadRequestsOverview();
  });
</script>
</body>
</html>
