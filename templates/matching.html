<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Mentors & Mentees</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { background: #f8f9fa; padding: 20px 0; }
    .matching-container { max-width: 1200px; margin: 0 auto; }
    
    .header-card { 
      background: white; 
      padding: 30px; 
      border-radius: 8px; 
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    
    .header-card h1 { margin: 0; }
    
    .header-actions { display: flex; gap: 10px; }
    
    /* ==================== BLOCK 1: FILTER ==================== */
    .filter-card {
      background: white;
      padding: 25px;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .filter-card h2 { 
      margin-bottom: 20px; 
      font-size: 20px;
      color: #333;
    }
    
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 15px;
      align-items: flex-end;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
    }
    
    .filter-group label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    
    .filter-group select, .filter-group input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .filter-group select:focus, .filter-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-apply {
      background: #667eea;
      color: white;
      padding: 10px 25px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-apply:hover {
      background: #5568d3;
    }
    
    /* ==================== BLOCK 2+3: RESULTS ==================== */
    .results-card {
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .results-card h2 {
      margin-bottom: 20px;
      font-size: 20px;
      color: #333;
    }
    
    .results-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .results-table thead {
      background: #f8f9fa;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .results-table th {
      padding: 15px;
      text-align: left;
      font-weight: 700;
      color: #333;
      font-size: 14px;
    }
    
    .results-table tbody tr {
      border-bottom: 1px solid #e0e0e0;
      transition: background-color 0.2s;
    }
    
    .results-table tbody tr:hover {
      background: #f8f9fa;
    }
    
    .results-table td {
      padding: 15px;
      vertical-align: middle;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .user-details h3 {
      margin: 0;
      font-size: 15px;
      color: #333;
    }
    
    .user-role {
      display: inline-block;
      background: #e7f3ff;
      color: #667eea;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    
    .topics-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .topic-badge {
      display: inline-block;
      background: #f0f1fa;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .role-detail {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    
    .location-info {
      color: #666;
      font-size: 14px;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn-send {
      background: #28a745;
      color: white;
    }
    
    .btn-send:hover {
      background: #218838;
    }
    
    .btn-view {
      background: #6c757d;
      color: white;
    }
    
    .btn-view:hover {
      background: #5a6268;
    }

    /* Request status button states */
    .btn-pending {
      background: #ffc107;
      color: #333;
      cursor: default;
    }

    .btn-accepted {
      background: #28a745;
      color: white;
      cursor: default;
    }

    .btn-rejected {
      background: #dc3545;
      color: white;
      cursor: default;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    
    .message {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    
    .message.show {
      display: block;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .message.warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    /* Profile modal */
    .modal-profile-role {
      display: inline-block;
      background: #e7f3ff;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
    }
    
    @media (max-width: 1024px) {
      .filter-row {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .filter-row {
        grid-template-columns: 1fr;
      }
      
      .results-table {
        font-size: 13px;
      }
      
      .results-table th, .results-table td {
        padding: 10px;
      }
      
      .action-buttons {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

<div class="matching-container">

  <!-- HEADER -->
  <div class="header-card">
    <h1>🔗 Find Mentors & Mentees</h1>
    <div class="header-actions">
      <a href="/preference" class="btn btn-primary">👥 My Preferences</a>
      <a href="/profile" class="btn btn-secondary">👤 My Profile</a>
      <a href="/logout" class="btn btn-outline-danger">Logout</a>
    </div>
  </div>

  <div id="message" class="message"></div>

  <!-- BLOCK 1: FILTER -->
  <div class="filter-card">
    <h2>🔍 Filter Results</h2>
    <div class="filter-row">
      <div class="filter-group">
        <label for="filter-topic">Topic</label>
        <select id="filter-topic">
          <option value="">-- All Topics --</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-role">Their Role</label>
        <select id="filter-role">
          <option value="">-- All Roles --</option>
          <option value="mentor">Mentor</option>
          <option value="mentee">Mentee</option>
          <option value="two_way">Two-way</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-location">Location</label>
        <select id="filter-location">
          <option value="">-- All Locations --</option>
        </select>
      </div>

      <button type="button" class="btn-apply" onclick="applyFilter()">Apply Filter</button>
    </div>
  </div>

  <!-- BLOCK 2+3: RESULTS + ACTIONS (COMBINED) -->
  <div class="results-card">
    <h2>📋 Results</h2>
    <div id="loading" class="loading" style="display: none;">⏳ Loading results...</div>
    <div id="results-container"></div>
  </div>

</div>

<!-- Public Profile Modal -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="profileModalLabel">👤 User Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="profileModalBody">
        <div class="text-center py-3">⏳ Loading...</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allTopics = [];
  let allCountries = [];
  let currentResults = [];

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = `message show ${type}`;
    setTimeout(() => { msg.className = 'message'; }, 4000);
  }

  async function loadTopics() {
    try {
      const res = await fetch('/api/topics');
      const data = await res.json();
      allTopics = data.topics || [];

      const select = document.getElementById('filter-topic');
      select.innerHTML = '<option value="">-- All Topics --</option>';
      allTopics.forEach(topic => {
        const opt = document.createElement('option');
        opt.value = topic.id;
        opt.textContent = topic.name;
        select.appendChild(opt);
      });
    } catch (error) {
      console.error('Error loading topics:', error);
    }
  }

  async function loadCountries() {
    try {
      const res = await fetch('/api/countries');
      const data = await res.json();
      allCountries = data.countries || [];

      const select = document.getElementById('filter-location');
      select.innerHTML = '<option value="">-- All Locations --</option>';
      allCountries.forEach(country => {
        const opt = document.createElement('option');
        opt.value = country.code;
        opt.textContent = country.name;
        select.appendChild(opt);
      });
    } catch (error) {
      console.error('Error loading countries:', error);
    }
  }

  async function applyFilter() {
    const topicId = document.getElementById('filter-topic').value;
    const roleFilter = document.getElementById('filter-role').value;
    const locationCode = document.getElementById('filter-location').value;

    const loading = document.getElementById('loading');
    const container = document.getElementById('results-container');

    loading.style.display = 'block';
    container.innerHTML = '';

    try {
      const params = new URLSearchParams();
      if (topicId) params.append('topic_id', topicId);
      if (roleFilter) params.append('role', roleFilter);
      if (locationCode) params.append('location', locationCode);

      const res = await fetch(`/api/matching/search?${params.toString()}`);
      const data = await res.json();

      loading.style.display = 'none';

      if (data.error) {
        showMessage('⚠️ ' + data.error, 'warning');
        container.innerHTML = '<div class="empty-state">😔 Could not load results. Please check your preferences are published.</div>';
        return;
      }

      if (!data.results || data.results.length === 0) {
        container.innerHTML = '<div class="empty-state">😔 No matches found. Try adjusting your filters or updating your preferences.</div>';
        return;
      }

      currentResults = data.results;
      renderResults(data.results);
    } catch (error) {
      loading.style.display = 'none';
      showMessage('❌ Error loading results', 'error');
      console.error('Error:', error);
    }
  }

  function renderActionButton(user) {
    const status = user.request_status;
    if (status === 'pending') {
      return `<button class="btn btn-pending" disabled>⏳ Pending</button>`;
    } else if (status === 'accepted') {
      return `<button class="btn btn-accepted" disabled>✅ Matched</button>`;
    } else if (status === 'rejected') {
      return `<button class="btn btn-rejected" disabled>❌ Rejected</button>`;
    }
    return `<button class="btn btn-send" onclick="sendRequest(${user.id})">Send Request</button>`;
  }

  function renderResults(results) {
    const container = document.getElementById('results-container');

    let html = '<table class="results-table"><thead><tr>';
    html += '<th>User</th>';
    html += '<th>Topics & Roles</th>';
    html += '<th>Location</th>';
    html += '<th style="width: 220px;">Actions</th>';
    html += '</tr></thead><tbody>';

    results.forEach(user => {
      const firstName = user.first_name || '';
      const lastName = user.last_name || '';
      const initials = ((firstName.length > 0 ? firstName[0] : '') + (lastName.length > 0 ? lastName[0] : '')).toUpperCase() || '?';

      // Format topics_with_roles: each topic shows the topic name + their preference role
      const topicsWithRoles = user.topics_with_roles || [];
      const topicsHtml = topicsWithRoles.map(t => {
        const topicName = t.topic || t.topic_name || '';
        const theirRole = t.preference_role || t.their_role || '';
        const myRole = t.my_role || '';
        let roleLabel = theirRole ? ` (${theirRole})` : '';
        const titleText = `Their role: ${theirRole}${myRole ? ' | Your role: ' + myRole : ''}`;
        return `<span class="topic-badge" title="${titleText}">${topicName}${roleLabel}</span>`;
      }).join('');

      const actionBtn = renderActionButton(user);

      html += '<tr>';
      html += `<td>
        <div class="user-info">
          <div class="user-avatar">${initials}</div>
          <div class="user-details">
            <h3>${firstName} ${lastName}</h3>
            <span class="user-role">${user.identity_role || ''}</span>
          </div>
        </div>
      </td>`;
      html += `<td><div class="topics-list">${topicsHtml || '<span class="text-muted">—</span>'}</div></td>`;
      html += `<td><span class="location-info">🌍 ${user.home_country || 'Not specified'}</span></td>`;
      html += `<td>
        <div class="action-buttons">
          ${actionBtn}
          <button class="btn btn-view" onclick="viewProfile(${user.id})">View Profile</button>
        </div>
      </td>`;
      html += '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  async function sendRequest(userId) {
    try {
      const res = await fetch('/api/matching/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to_person_id: userId })
      });

      const data = await res.json();

      if (res.ok) {
        showMessage('✅ Request sent successfully!', 'success');
        await applyFilter(); // Refresh results to show updated status
      } else if (res.status === 409) {
        showMessage('⚠️ Request already exists (' + (data.status || 'pending') + ')', 'warning');
        await applyFilter();
      } else {
        showMessage('❌ ' + (data.error || 'Error sending request'), 'error');
      }
    } catch (error) {
      showMessage('❌ Error: ' + error.message, 'error');
    }
  }

  async function viewProfile(userId) {
    const modal = new bootstrap.Modal(document.getElementById('profileModal'));
    const modalBody = document.getElementById('profileModalBody');
    modalBody.innerHTML = '<div class="text-center py-3">⏳ Loading...</div>';
    modal.show();

    try {
      const res = await fetch(`/api/matching/public-profile/${userId}`);
      const data = await res.json();

      if (!res.ok || !data.profile) {
        modalBody.innerHTML = '<div class="text-center text-danger py-3">❌ Could not load profile.</div>';
        return;
      }

      const p = data.profile;
      const fn = p.first_name || '';
      const ln = p.last_name || '';
      const initials = ((fn.length > 0 ? fn[0] : '') + (ln.length > 0 ? ln[0] : '')).toUpperCase() || '?';
      const countryDisplay = p.country_name || p.home_country || 'Not specified';

      modalBody.innerHTML = `
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="user-avatar" style="width:60px;height:60px;font-size:22px;">${initials}</div>
          <div>
            <h4 class="mb-1">${p.first_name || ''} ${p.last_name || ''}</h4>
            <span class="modal-profile-role">${p.identity_role || ''}</span>
          </div>
        </div>
        <hr>
        <p><strong>📍 Location:</strong> ${countryDisplay}</p>
      `;
    } catch (error) {
      modalBody.innerHTML = '<div class="text-center text-danger py-3">❌ Error loading profile.</div>';
      console.error('Error loading profile:', error);
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await Promise.all([loadTopics(), loadCountries()]);
    await applyFilter(); // Load initial results
  });
</script>

</body>
</html>
